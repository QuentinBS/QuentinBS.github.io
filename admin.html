<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <!-- Quill Rich Text Editor CSS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        input { width: 100%; padding: 0.5rem; margin-bottom: 1rem; font-size: 1.2rem; }
        #editor { height: 300px; margin-bottom: 1rem; }
        button { background: #2b6cb0; color: white; border: none; padding: 0.8rem 1.5rem; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Write a New Blog Post</h1>
    
    <input type="text" id="post-title" placeholder="Enter post title...">
    
    <!-- This is the Rich Text Editor box -->
    <div id="editor"></div>
    
    <button onclick="publishPost()">Publish Post</button>
    <p id="status-message"></p>

    <!-- Quill Editor JS -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        // Initialize the Rich Text Editor
        var quill = new Quill('#editor', { theme: 'snow' });

        // REPLACE THESE WITH YOUR SUPABASE CREDENTIALS
        const SUPABASE_URL = 'https://oeffdzvomoxuxlleoizd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lZmZkenZvbW94dXhsbGVvaXpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMDI5NTIsImV4cCI6MjA5MTc3ODk1Mn0.gK37r_PikM1eElOo0YH2SezgyOPJQ22UFah_-6KgmQk';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function publishPost() {
            const title = document.getElementById('post-title').value;
            const content = quill.root.innerHTML; // Gets the formatted text

            if (!title) {
                alert("Please add a title!");
                return;
            }

            const { data, error } = await supabase
                .from('posts')
                .insert([{ title: title, content: content }]);

            if (error) {
                document.getElementById('status-message').innerText = "Error publishing post.";
                console.error(error);
            } else {
                document.getElementById('status-message').innerText = "Post published successfully!";
                document.getElementById('post-title').value = '';
                quill.root.innerHTML = ''; // Clear editor
            }
        }
    </script>
</body>
</html>
